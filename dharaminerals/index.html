<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dharaminerals</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
">

  <div style="display:flex; align-items:center;">
    <img src="../logo.png" style="width:50px; margin-right:10px;">
    <h2 style="margin:0; font-size:20px; letter-spacing:2px;">
      DHARA MINERALS
    </h2>
  </div>

  <nav>
    <a href="/" style="text-decoration:none; color:white; transition:0.3s;">Home</a>
  </nav>

</header>

<!-- MAIN PRODUCT -->
<section class="product-section">
  <div class="product-container">

    <div class="product-image">
      <img src="../bottle-main.png" alt="Dharaminerals Bottle">
    </div>

    <div class="product-text">
      <h2>Dharaminerals</h2>
      <p><strong>Pure. Clean. Reliable.</strong></p>
      <p>
        We provide customized bottled water solutions for hotels,
        events, and businesses.
      </p>
    </div>

  </div>
</section>

<!-- SECOND SECTION -->
<section style="margin-top:40px; padding:40px;">
  <h2 style="text-align:center;">Our Product</h2>

  <div style="
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:40px;
    margin-top:30px;
  ">

    <div style="max-width:500px;">
      <p>
        Dharaminerals provides clean, pure, and reliable bottled water
        designed for businesses, events, and everyday use.
      </p>
    </div>

    <div>
      <img src="../bottle-clean.png" alt="Dharaminerals Bottle" style="max-width:350px; width:100%;">
    </div>

  </div>
</section>

</body>
</html>
