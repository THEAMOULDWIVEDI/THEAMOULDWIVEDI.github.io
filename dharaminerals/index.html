<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dhara Minerals</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <header style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
">

  <!-- LEFT: LOGO + NAME -->
  <div style="display:flex; align-items:center;">
    <img src="../logo.png" style="width:50px; margin-right:10px;">
    <h2 style="margin:0; font-size:20px; letter-spacing:2px;">
      DHARA MINERALS
    </h2>
  </div>

  <!-- RIGHT: NAV -->
  <nav>
   <a href="/" style="text-decoration:none; color:white; transition:0.3s;">Home</a>

</header>

<!-- MAIN PRODUCT -->
<section class="product-section">
  <div class="product-container">

    <div class="product-image">
      <img src="../bottle-main.png" alt="Dhara Bottle">
    </div>

    <div class="product-text">
      <h2>Dhara Minerals</h2>
      <p><strong>Pure. Clean. Reliable.</strong></p>
      <p>
        We provide customized bottled water solutions for hotels,
        events, and businesses.
      </p>
    </div>

  </div>
</section>

<!-- SECOND SECTION -->
<section style="margin-top:40px;">
  <h2 style="text-align:center;">Our Product</h2>

  <div style="display:flex; justify-content:flex-end; padding-right:40px;">
    <img src="../bottle-clean.png" alt="Dhara Bottle" style="max-width:350px; width:100%;">
  </div>

  body {
  color: white;
}
  a:hover {
  color: #00ffcc;
}
  
</section>
</body>
</html>
